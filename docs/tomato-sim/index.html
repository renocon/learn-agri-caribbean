<body>

  <header class="topbar">
    <a class="home" href="../index.html">← Home</a>
    <h1>Tomato Growth Simulator <span class="subtitle">| CSEC Agricultural Science</span></h1>
  </header>

  <main>
    <section class="plant-pane" aria-label="Tomato plant illustration">
      <svg id="plantSvg" viewBox="0 0 380 500" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Animated tomato plant at the current growth stage"></svg>
      <div id="branchBadge" class="branch-badge"></div>
    </section>

    <section class="info-pane">
      <div class="stage-head">
        <h2 id="stageName"></h2>
        <div class="stage-meta" id="stageMeta"></div>
      </div>

      <div class="timeline" id="timeline" aria-label="Growth stage timeline"></div>

      <div class="content">
        <div class="branch-panel" id="branchPanel">
          <h3>Decision point — how will you manage this crop?</h3>
          <p class="lead">The next two weeks of cell division decide the fruit's fate. Choose the management path:</p>
          <div class="choices">
            <button class="branch-btn good" id="chooseHealthy">✓ Good Management<small>Consistent water &amp; calcium → healthy harvest</small></button>
            <button class="branch-btn poor" id="chooseBer">⚠ Poor Management<small>Irregular water, low calcium → Blossom End Rot</small></button>
          </div>
        </div>

        <div class="nav">
          <button id="prevBtn">← Prev</button>
          <button id="playBtn">▶ Autoplay</button>
          <button id="nextBtn">Next →</button>
        </div>

        <div id="cards"></div>
      </div>
