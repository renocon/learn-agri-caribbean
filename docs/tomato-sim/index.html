/* ═══════════════════════════════════════════════

═══════════════════════════════════════════════ */
const STAGES = [
  /* ── COMMON ─────────────────────────────────────────── */
  {

    observe:['No visible seedling yet — expect emergence in 5–10 days.','Surface should feel damp but not waterlogged.','Check daily for moisture; cover trays with plastic to retain humidity.'],

  {
    id:'seedling', pk:'seedling', branch:null, name:'Seedling', days:'Day 10–21',
    happening:'The cotyledons spread and begin photosynthesising. The first true leaves — compound (pinnate), hairy, and quite different from the smooth cotyledons — emerge between them. The seedling is establishing its root system rapidly but is still fragile.',

  {

/* ═══════════════════════════════════════════════
   DRAWING FUNCTIONS
═══════════════════════════════════════════════ */

function addDefs(svg) {
  const defs = svgEl('defs');

  const grad = (id, stops, x1='0',y1='0',x2='0',y2='1') => {
    const g = svgEl('linearGradient', {id, x1, y1, x2, y2});
    stops.forEach(([off,col]) => {
      const s = svgEl('stop'); s.setAttribute('offset',off); s.setAttribute('stop-color',col); g.appendChild(s);
    });
    return g;
  };

  const radGrad = (id, stops, cx='50%',cy='50%',r='50%') => {
    const g = svgEl('radialGradient', {id, cx, cy, r, fx:cx, fy:cy});
    stops.forEach(([off,col,op]) => {
      const s = svgEl('stop'); s.setAttribute('offset',off); s.setAttribute('stop-color',col);
      if (op !== undefined) s.setAttribute('stop-opacity', op);
      g.appendChild(s);
    });
    return g;
  };

  defs.appendChild(grad('skyG',   [['0%','#5b9fd9'],['100%','#b8dcf2']]));
  defs.appendChild(grad('soilG',  [['0%','#7b4a2a'],['100%','#3d2b1f']]));
  defs.appendChild(grad('woodG',  [['0%','#9b6235'],['100%','#6b3e1c']]));
  defs.appendChild(radGrad('sunG',[['0%','#ffe566'],['70%','#ffd000'],['100%','#ffd000',0]],'50%','50%','50%'));
  defs.appendChild(radGrad('frGreenG', [['0%','#6ab830'],['60%','#4a8a25'],['100%','#2d6b15']]));
  defs.appendChild(radGrad('frOrangeG',[['0%','#fbbf24'],['55%','#f97316'],['100%','#c2410c']]));
  defs.appendChild(radGrad('frRedG',   [['0%','#f87171'],['55%','#dc2626'],['100%','#991b1b']]));
  defs.appendChild(radGrad('berG',     [['0%','#0a0a0a'],['50%','#6b1a1a'],['100%','#6b1a1a',0]],'50%','100%','55%'));
  defs.appendChild(radGrad('berLG',    [['0%','#000000'],['40%','#1a0000'],['80%','#6b1a1a'],['100%','#6b1a1a',0]],'50%','100%','55%'));

  // Clipping path: below soil (for roots)
  const cp = svgEl('clipPath', {id:'belowSoil'});
  cp.appendChild(svgEl('rect', {x:0, y:SOIL_Y, width:W, height:H-SOIL_Y}));
  defs.appendChild(cp);

  svg.appendChild(defs);
}

function drawBackground(svg) {
  svg.appendChild(svgEl('rect', {width:W, height:SOIL_Y, fill:'url(#skyG)'}));
  // Sun
  svg.appendChild(svgEl('circle', {cx:330, cy:52, r:34, fill:'url(#sunG)'}));
  // Clouds
  [[80,55,0.4],[110,42,0.3],[95,62,0.25]].forEach(([cx,cy,op]) =>
    svg.appendChild(svgEl('ellipse', {cx, cy, rx:28, ry:12, fill:'#fff', opacity:op}))
  );
  [[130,50,0.35],[158,42,0.28]].forEach(([cx,cy,op]) =>
    svg.appendChild(svgEl('ellipse', {cx, cy, rx:22, ry:10, fill:'#fff', opacity:op}))
  );
}

function drawGrowBox(svg) {
  // Box frame
  svg.appendChild(svgEl('rect', {x:28, y:SOIL_Y, width:324, height:135, rx:4, fill:'url(#woodG)', stroke:'#4a2a0a', 'stroke-width':2}));
  // Soil inside
  svg.appendChild(svgEl('rect', {x:33, y:SOIL_Y+3, width:314, height:129, fill:'url(#soilG)'}));
  // Slat lines
  [28,52].forEach(dy =>
    svg.appendChild(svgEl('line', {x1:28, y1:SOIL_Y+dy, x2:352, y2:SOIL_Y+dy, stroke:'rgba(0,0,0,0.18)', 'stroke-width':1.2}))
  );
}

function drawStake(svg, stemH, stakeH) {
  if (stakeH <= 0) return;
  const top = SOIL_Y - Math.min(stemH * 1.15 * stakeH, stemH + 30);
  const bot = SOIL_Y + 40;
  svg.appendChild(svgEl('line', {
    x1: BASE_X+14, y1: bot, x2: BASE_X+14, y2: top,
    stroke:'#c4a266', 'stroke-width': 5, 'stroke-linecap':'round', opacity:0.85
  }));
  // Knot tie
  svg.appendChild(svgEl('ellipse', {cx: BASE_X+12, cy: SOIL_Y - stemH*0.5, rx:5, ry:3, fill:'#8b6c3a', opacity:0.7}));
}

function drawRoots(svg, stemH) {
  const g = svgEl('g', {'clip-path':'url(#belowSoil)', opacity:0.35});
  const depth = Math.min(stemH * 0.38, 85);
  const col = '#c8a06a';
  const mainRoot = `M ${BASE_X} ${SOIL_Y} L ${BASE_X} ${SOIL_Y+depth}`;
  g.appendChild(svgEl('path', {d:mainRoot, stroke:col, 'stroke-width':2, fill:'none'}));
  [[-30,0.55],[-55,0.4],[30,0.5],[50,0.35],[-20,0.8],[25,0.75]].forEach(([dx,frac]) => {
    const ry = SOIL_Y + depth*frac;
    const ex = BASE_X + dx*1.4;
    const ey = ry + Math.abs(dx)*0.3;
    g.appendChild(svgEl('path', {d:`M ${BASE_X} ${ry} Q ${BASE_X+dx*0.6} ${ry+8} ${ex} ${ey}`, stroke:col, 'stroke-width':1.2, fill:'none'}));
  });
  svg.appendChild(g);
}

function drawStem(svg, stemH, stemW, stress=false) {
  const topY = SOIL_Y - stemH;
  const col = stress ? '#5a7a2a' : '#3b7a1a';
  const d = `M ${BASE_X} ${SOIL_Y} C ${BASE_X+6} ${SOIL_Y-stemH*0.4} ${BASE_X-4} ${SOIL_Y-stemH*0.7} ${BASE_X} ${topY}`;
  svg.appendChild(svgEl('path', {d, fill:'none', stroke:col, 'stroke-width':stemW, 'stroke-linecap':'round'}));
}

function leafletShape(len, w) {
  return `M 0 0 C ${-w} ${-len*0.28} ${-w} ${-len*0.72} 0 ${-len} C ${w} ${-len*0.72} ${w} ${-len*0.28} 0 0`;
}

function addLeaflet(parent, x, y, angle, len, w, fill) {
  const g = svgEl('g', {transform:`translate(${x},${y}) rotate(${angle})`});
  g.appendChild(svgEl('path', {d:leafletShape(len,w), fill, stroke:'rgba(0,50,0,0.18)', 'stroke-width':0.5}));
  g.appendChild(svgEl('line', {x1:0,y1:0,x2:0,y2:-len, stroke:'rgba(255,255,255,0.22)', 'stroke-width':0.75}));
  parent.appendChild(g);
}

function drawCompoundLeaf(svg, x, y, angle, scale, fill) {
  const g = svgEl('g', {transform:`translate(${x},${y}) rotate(${angle}) scale(${scale})`});
  const rL = 33;
  g.appendChild(svgEl('line', {x1:0,y1:0,x2:rL,y2:0, stroke:fill, 'stroke-width':1.3, opacity:0.75}));
  addLeaflet(g, rL,      0,  90, 17, 7, fill);   // terminal
  addLeaflet(g, rL*0.67, 0,  52, 13, 6, fill);   // upper pair
  addLeaflet(g, rL*0.67, 0, 128, 13, 6, fill);
  addLeaflet(g, rL*0.37, 0,  50, 10, 5, fill);   // lower pair
  addLeaflet(g, rL*0.37, 0, 130, 10, 5, fill);
  svg.appendChild(g);
}

function drawLeaves(svg, stemH, lc, stress, severe) {
  for (let i = 0; i < lc; i++) {
    const pos = LEAF_POS[i];
    const y = SOIL_Y - stemH * pos.f;
    const angle = pos.side === 'R' ? LEAF_ANGLE_R : LEAF_ANGLE_L;
    const fill = severe && i < 2 ? '#9a9a25'
               : stress && i < 1 ? '#8a9a28'
               : '#3a8a20';
    drawCompoundLeaf(svg, BASE_X, y, angle, pos.sc, fill);
  }
}

function drawCotyledons(svg, stemH) {
  const tipY = SOIL_Y - stemH;
  const fill = '#7cb342';
  [[-13,-10,-28],[13,-10,28]].forEach(([dx,dy,rot]) => {
    svg.appendChild(svgEl('ellipse', {
      cx: BASE_X+dx, cy: tipY+dy, rx:7, ry:11,
      transform:`rotate(${rot},${BASE_X+dx},${tipY+dy})`,
      fill, stroke:'rgba(0,50,0,0.2)', 'stroke-width':0.5
    }));
  });
}

function drawSeedInSoil(svg) {
  svg.appendChild(svgEl('ellipse', {
    cx:BASE_X, cy:SOIL_Y+18, rx:6, ry:4,
    fill:'#d4b896', stroke:'#8b6340', 'stroke-width':1.2
  }));
}

function drawFlower(svg, x, y, size=10) {
  const g = svgEl('g', {transform:`translate(${x},${y})`});
  for (let i = 0; i < 5; i++) {
    const a = (i*72 - 90) * Math.PI / 180;
    const px = Math.cos(a) * size*0.52;
    const py = Math.sin(a) * size*0.52;
    const pe = svgEl('ellipse', {
      cx:px, cy:py, rx:size*0.38, ry:size*0.5,
      transform:`rotate(${i*72},${px},${py})`,
      fill:'#FFE000', stroke:'#D4B800', 'stroke-width':0.5
    });
    g.appendChild(pe);
  }
  g.appendChild(svgEl('circle', {cx:0, cy:0, r:size*0.22, fill:'#5a8800', stroke:'#3a6800', 'stroke-width':0.5}));
  svg.appendChild(g);
}

function drawCalyx(svg, cx, cy, r) {
  for (let i=0;i<5;i++) {
    const a = (i*72 - 90) * Math.PI/180;
    const x2 = cx + Math.cos(a)*r*1.6;
    const y2 = cy + Math.sin(a)*r*1.6;
    svg.appendChild(svgEl('line', {x1:cx,y1:cy,x2,y2, stroke:'#2d7a10', 'stroke-width':1.4, 'stroke-linecap':'round'}));
  }
}

function fruitFill(cs) {
  return cs==='rd' ? 'url(#frRedG)' : cs==='or' ? 'url(#frOrangeG)' : 'url(#frGreenG)';
}

function drawFruit(svg, stemH, fruits) {
  if (!fruits || fruits.length === 0) return;
  const topY = SOIL_Y - stemH;
  const trussX = BASE_X + 5;
  const trussY = topY + CLUSTER_DY;

  // Truss line
  const tg = svgEl('g');
  fruits.forEach((f, i) => {
    const fx = trussX + FRUIT_OFF[i].dx;
    const fy = trussY + FRUIT_OFF[i].dy;
    tg.appendChild(svgEl('path', {
      d:`M ${trussX} ${trussY} Q ${(trussX+fx)/2} ${trussY+8} ${fx} ${fy-f.r}`,
      fill:'none', stroke:'#3b7a1a', 'stroke-width':1.3, opacity:0.7
    }));
  });
  svg.appendChild(tg);

  fruits.forEach((f, i) => {
    const fx = trussX + FRUIT_OFF[i].dx;
    const fy = trussY + FRUIT_OFF[i].dy;
    const g = svgEl('g');

    // Main fruit circle
    g.appendChild(svgEl('circle', {cx:fx, cy:fy, r:f.r, fill:fruitFill(f.cs)}));

    // Highlight
    g.appendChild(svgEl('circle', {
      cx:fx-f.r*0.28, cy:fy-f.r*0.28, r:f.r*0.28,
      fill:'rgba(255,255,255,0.22)'
    }));

    // Calyx at top
    drawCalyx(g, fx, fy-f.r+1, f.r*0.28);

    // BER patch (radial from bottom)
    if (f.b > 0) {
      const berR  = f.r * (0.6 + f.b * 0.5);
      const berGrad = f.b > 0.4 ? 'url(#berLG)' : 'url(#berG)';
      g.appendChild(svgEl('circle', {
        cx:fx, cy:fy+f.r*0.4,
        r: berR,
        fill: berGrad,
        opacity: Math.min(0.95, 0.6 + f.b * 0.5),
        'clip-path': `none`
      }));
      // Leathery texture lines
      if (f.b > 0.35) {
        for (let li=0;li<3;li++) {
          const a = (li*60 - 30) * Math.PI/180;
          const ex = fx + Math.cos(a)*berR*0.55;
          const ey = fy + f.r*0.4 + Math.sin(a)*berR*0.55;
          g.appendChild(svgEl('line', {
            x1:fx,y1:fy+f.r*0.4, x2:ex,y2:ey,
            stroke:'rgba(0,0,0,0.25)', 'stroke-width':0.7
          }));
        }
      }
    }

    svg.appendChild(g);
  });
}

function drawFlowers(svg, stemH, count) {
  if (count === 0) return;
  const topY = SOIL_Y - stemH;
  const trussX = BASE_X + 5;
  const trussY = topY + CLUSTER_DY;
  FRUIT_OFF.slice(0, count).forEach((off, i) => {
    const fx = trussX + off.dx;
    const fy = trussY + off.dy;
    svg.appendChild(svgEl('path', {
      d:`M ${trussX} ${trussY} Q ${(trussX+fx)/2} ${trussY+8} ${fx} ${fy}`,
      fill:'none', stroke:'#3b7a1a', 'stroke-width':1.2, opacity:0.7
    }));
    drawFlower(svg, fx, fy, 10);
  });
}

/* Master draw function */
function drawPlant(svgEl, stageId) {
  // Clear
  while (svgEl.firstChild) svgEl.removeChild(svgEl.firstChild);

  addDefs(svgEl);
  const p = PP[stageId];
  if (!p) return;

  drawBackground(svgEl);
  drawGrowBox(svgEl);

  if (p.stemH > 0) drawRoots(svgEl, p.stemH);
  if (p.sk > 0)    drawStake(svgEl, p.stemH, p.sk);
  if (p.stemH > 0) drawStem(svgEl, p.stemH, p.stemW, p.stress);
  if (p.lc > 0)    drawLeaves(svgEl, p.stemH, p.lc, p.stress, p.severe);
  if (p.cots)      drawCotyledons(svgEl, p.stemH);
  if (p.seed)      drawSeedInSoil(svgEl);
  if (p.fl > 0)    drawFlowers(svgEl, p.stemH, p.fl);
  if (p.fruits && p.fruits.length > 0) drawFruit(svgEl, p.stemH, p.fruits);
}

/* ═══════════════════════════════════════════════
   UI STATE
═══════════════════════════════════════════════ */
let state = {
  idx:    0,        // index into current path array
  branch: null,     // null | 'healthy' | 'ber'
  playing: false,
  timer:  null,
};

function getPath() {
  const common = STAGES.filter(s => !s.branch);
  if (!state.branch) return common;
  return [...common, ...STAGES.filter(s => s.branch === state.branch)];
}

function currentStage() { return getPath()[state.idx]; }

/* ═══════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════ */
function render(transition=true) {
  const stage = currentStage();
  const path  = getPath();
  const svg   = document.getElementById('plant-svg');

  // Transition
  if (transition) {
    svg.classList.add('fading');
    setTimeout(() => {
      drawPlant(svg, stage.pk);
      svg.classList.remove('fading');
    }, 350);
  } else {
    drawPlant(svg, stage.pk);
  }

  // Stage header
  document.getElementById('stageName').textContent = stage.name;
  document.getElementById('stageDays').textContent = stage.days;

  // Branch badge
  const badge = document.getElementById('branchBadge');
  badge.className = 'branch-badge';
  if (state.branch === 'healthy') { badge.textContent = '✓ Healthy path'; badge.classList.add('healthy'); }
  else if (state.branch === 'ber')  { badge.textContent = '⚠ BER path';    badge.classList.add('ber'); }

  // Timeline
  buildTimeline(path, stage);

  // Info content
  buildInfo(stage);

  // Nav buttons
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  prevBtn.disabled = state.idx === 0;
  nextBtn.disabled = stage.isBranch || state.idx === path.length - 1;
}

function buildTimeline(path, current) {
  const tl = document.getElementById('timeline');
  tl.innerHTML = '';

  const commonCount = STAGES.filter(s=>!s.branch).length;
  const totalCommon = commonCount;

  path.forEach((s, i) => {
    if (i === totalCommon && state.branch) {
      const sep = document.createElement('span');
      sep.className = 'tl-sep';
      sep.textContent = '›';
      tl.appendChild(sep);
    }
    const dot = document.createElement('div');
    dot.className = 'tl-dot';
    if (s.branch === 'ber')        dot.classList.add('ber-dot');
    if (i < state.idx)             dot.classList.add('past');
    if (i === state.idx)           dot.classList.add('active');
    dot.title = s.name;
    dot.addEventListener('click', () => {
      if (s.branch && s.branch !== state.branch) return; // can't click other branch
      if (s.isBranch || (!s.branch && state.idx >= totalCommon)) {
        // navigating in common stages is always fine
      }
      state.idx = i;
      render();
    });
    tl.appendChild(dot);
  });
}

function buildInfo(stage) {
  const scroll = document.getElementById('infoScroll');
  scroll.innerHTML = '';

  // Branch choice panel
  if (stage.isBranch) {
    const panel = document.createElement('div');
    panel.id = 'branchPanel';
    panel.innerHTML = `
      <h3>&#9888; This is a decision point</h3>
      <p>What happens next depends on how the crop is managed. Choose a path to see the outcome:</p>
      <div class="branch-btns">
        <button class="branch-btn h-btn" id="btnHealthy">
          ✓ Good Management<br><small style="font-weight:normal;">Consistent watering &amp; calcium — healthy fruit development</small>
        </button>
        <button class="branch-btn b-btn" id="btnBer">
          ⚠ Poor Management<br><small style="font-weight:normal;">Irregular watering, low calcium — Blossom End Rot develops</small>
        </button>
      </div>
    `;
    scroll.appendChild(panel);
    document.getElementById('btnHealthy').addEventListener('click', () => chooseBranch('healthy'));
    document.getElementById('btnBer').addEventListener('click', () => chooseBranch('ber'));
  }

  const cards = [
    { title: 'What is happening', body: stage.happening, icon: '🌱' },
    { title: 'Farmer actions',     list: stage.actions,   icon: '👨‍🌾' },
    { title: 'What to observe',    list: stage.observe,   icon: '🔍' },
    { title: 'Nutrition',          body: stage.nutrition, icon: '🧪' },
    { title: 'Weather conditions', body: stage.weather,   icon: '🌤' },
  ];

  cards.forEach(c => {
    const card = document.createElement('div');
    card.className = 'info-card';
    let inner = `<h3>${c.icon} ${c.title}</h3>`;
    if (c.body) {
      inner += `<p>${c.body}</p>`;
    } else if (c.list) {
      inner += '<ul>' + c.list.map(item => `<li>${item}</li>`).join('') + '</ul>';
    }
    card.innerHTML = inner;
    scroll.appendChild(card);
  });
}

/* ═══════════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════════ */
function chooseBranch(branch) {
  state.branch = branch;
  state.idx = STAGES.filter(s => !s.branch).length; // first branched stage
  render();
}

function goNext() {
  const path = getPath();
  const stage = currentStage();
  if (stage.isBranch) return; // handled by branch choice
  if (state.idx < path.length - 1) {
    state.idx++;
    render();
  }
}

function goPrev() {
  if (state.idx > 0) {
    const commonCount = STAGES.filter(s => !s.branch).length;
    // Going back from first branched stage returns to branch point
    if (state.branch && state.idx === commonCount) {
      state.branch = null;
      state.idx = commonCount - 1; // back to fruitSet
    } else {
      state.idx--;
    }
    render();
  }
}

document.getElementById('prevBtn').addEventListener('click', goPrev);
document.getElementById('nextBtn').addEventListener('click', goNext);

/* ═══════════════════════════════════════════════
   AUTOPLAY
═══════════════════════════════════════════════ */
const PLAY_INTERVAL = 5000;

function setPlaying(val) {
  state.playing = val;
  const btn = document.getElementById('playBtn');
  btn.textContent = val ? '⏸ Pause' : '▶ Autoplay';
  btn.classList.toggle('playing', val);
  if (val) {
    state.timer = setInterval(() => {
      const path = getPath();
      const stage = currentStage();
      if (stage.isBranch) {
        // auto-choose healthy on autoplay
        chooseBranch('healthy');
      } else if (state.idx < path.length - 1) {
        state.idx++;
        render();
      } else {
        setPlaying(false);
      }
    }, PLAY_INTERVAL);
  } else {
    clearInterval(state.timer);
    state.timer = null;
  }
}

document.getElementById('playBtn').addEventListener('click', () => setPlaying(!state.playing));

// Stop autoplay on manual navigation
['prevBtn','nextBtn'].forEach(id =>
  document.getElementById(id).addEventListener('click', () => state.playing && setPlaying(false))
);

/* ═══════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════ */
render(false);
</script>
</body>
